name: Commitlint

on:
  pull_request:
    paths-ignore:
      - "README.md"

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate commit messages
        run: |
          # Revisa commits desde la base del PR hasta HEAD
          npx @commitlint/cli --from=main --to=HEAD