name: Lint & Prettier

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          mkdir -p reports
          npx eslint 'src/**/*.{ts,tsx,js,jsx}' -f html -o reports/eslint-report.html
          npx eslint 'src/**/*.{ts,tsx,js,jsx}' --max-warnings=0

      - name: Run Prettier check
        run: |
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,scss,md}"

      - name: Run Prettier format (optional)
        run: |
          npx prettier --write "src/**/*.{ts,tsx,js,jsx,json,css,scss,md}"

      - name: Upload ESLint report
        uses: actions/upload-artifact@v3
        with:
          name: eslint-report
          path: reports/eslint-report.html