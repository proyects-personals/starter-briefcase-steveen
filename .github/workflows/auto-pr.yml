name: Auto PR after CI

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'ci/**'
      - 'test/**'
      - 'style/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Commitlint
        run: npx commitlint --from=origin/main --to=HEAD

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --ci

      - name: Security audit
        run: npm audit --audit-level=high

  create-pr:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =============================
      # COMMIT SUMMARY (FIX DEFINITIVO)
      # =============================
      - name: Generate commit summary
        id: commits
        shell: bash
        run: |
          SUMMARY="$(git log origin/main..HEAD --pretty=format:'- %s' | sed ':a;N;$!ba;s/\n/\\n/g')"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      # =============================
      # DETECT COMMIT TYPES
      # =============================
      - name: Detect commit types
        id: types
        shell: bash
        run: |
          TYPES="$(git log origin/main..HEAD --pretty=format:'%s' | cut -d: -f1 | sort -u | tr '\n' ', ' | sed 's/, $//')"
          echo "types=$TYPES" >> "$GITHUB_OUTPUT"

      # =============================
      # CREATE PULL REQUEST
      # =============================
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          title: "${{ steps.types.outputs.types }} → ${{ github.ref_name }}"
          body: |
            ## Descripción
            Cambios incluidos en este PR:

            ${{ steps.commits.outputs.summary }}

            ## Tipos de cambio detectados
            `${{ steps.types.outputs.types }}`

            ## Checklist automático (CI)
            - [x] Commitlint
            - [x] Lint
            - [x] Tests
            - [x] Security audit

            ## Seguridad
            Este PR solo se crea si **todas las validaciones pasan correctamente**.