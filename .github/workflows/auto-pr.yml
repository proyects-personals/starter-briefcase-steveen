name: PR CI & Auto Pull request

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Commitlint
        run: npx commitlint --from=origin/${{ github.base_ref }} --to=HEAD

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --ci

      - name: Security audit
        run: npm audit --audit-level=high

  update-pr:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits
        run: |
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:'- %s' | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "COMMITS=$COMMITS" >> $GITHUB_ENV

      - name: Collect first commit title
        run: |
          FIRST_COMMIT=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:'%s' | tail -n 1)
          echo "FIRST_COMMIT=$FIRST_COMMIT" >> $GITHUB_ENV

      - name: Collect changed files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "FILES=$FILES" >> $GITHUB_ENV

      - name: Detect commit types
        run: |
          TYPES=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:'%s' | cut -d: -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "TYPES=$TYPES" >> $GITHUB_ENV

      - name: Update PR title & body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request

            const commits = (process.env.COMMITS || '- Sin commits').replace(/\\n/g, '\n')
            const files = (process.env.FILES || '- Sin cambios').replace(/\\n/g, '\n')
            const firstCommit = process.env.FIRST_COMMIT || pr.head.ref
            const types = process.env.TYPES || 'chore'

            const title = firstCommit

            const body =
              '## ð§¾ DescripciÃ³n\n' +
              'Este PR incluye los siguientes cambios:\n\n' +
              '## ð Cambios realizados\n' +
              commits + '\n\n' +
              '## ð Archivos modificados\n' +
              files.split('\n').map(f => `- \`${f}\``).join('\n') + '\n\n' +
              '## ð·ï¸ Tipo de cambio\n' +
              `\`${types}\`\n\n` +
              '## âï¸ Checklist CI\n' +
              '- [x] Commitlint\n' +
              '- [x] Lint\n' +
              '- [x] Tests\n' +
              '- [x] Security audit\n\n' +
              '_PR actualizado automÃ¡ticamente por CI_ ð¤'

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title,
              body
            })